<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production LLM Chatbot</title>
    
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1> Production LLM Chatbot </h1>
        <div id="chat-box"></div>
        <div class="input-area">
            <input 
                id="message"
                type="text"
                placeholder="Ask me anything..."
            >
            <button id="send">
                Send
            </button>
        </div>
    </div>
    <script src="script.js"></script>

</body>
</html>
