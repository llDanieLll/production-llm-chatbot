<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Production LLM Chatbot</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- Header -->
    <header class="header">

        <h1>Production LLM Chatbot</h1>

        <p class="subtitle">
            Local AI powered by FastAPI + Ollama + Qwen
        </p>

    </header>

    <!-- Chat messages go here -->
    <main id="chat-box" class="chat-box">

    </main>

    <!-- Input -->
    <footer class="input-container">

        <input
            id="message"
            type="text"
            placeholder="Message Production LLM Chatbot..."
            autocomplete="off"
        >

        <button id="send">
            Send
        </button>

    </footer>

</div>

<script src="script.js"></script>

</body>

</html>
